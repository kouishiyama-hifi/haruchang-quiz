<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>はるちゃん食堂クイズ</title>
<link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --cream:#fff8f0;
  --warm:#ffe8d0;
  --orange:#ff6b35;
  --orange2:#ff9a6c;
  --pink:#ff6b9d;
  --yellow:#ffcc00;
  --green:#3dba6f;
  --red:#ff4757;
  --brown:#4a2c0a;
  --muted:#9a7a5a;
  --shadow:rgba(74,44,10,.12);
  --card:#ffffff;
}

body{
  font-family:'M PLUS Rounded 1c',sans-serif;
  background:var(--cream);
  color:var(--brown);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── 背景 ── */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 10% 10%,#ffe0b250,transparent 50%),
    radial-gradient(ellipse at 90% 90%,#ffc1cc30,transparent 50%);
  pointer-events:none;z-index:0;
}

/* ── 浮かぶデコ ── */
.bg-deco{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-deco span{
  position:absolute;font-size:2rem;opacity:.07;
  animation:floaty 7s ease-in-out infinite;
}
.bg-deco span:nth-child(1){top:5%;left:4%;animation-delay:0s}
.bg-deco span:nth-child(2){top:12%;left:91%;animation-delay:1.2s}
.bg-deco span:nth-child(3){top:38%;left:5%;animation-delay:.6s}
.bg-deco span:nth-child(4){top:60%;left:88%;animation-delay:2s}
.bg-deco span:nth-child(5){top:80%;left:6%;animation-delay:1.5s}
.bg-deco span:nth-child(6){top:88%;left:90%;animation-delay:.3s}
.bg-deco span:nth-child(7){top:50%;left:48%;animation-delay:3s}
@keyframes floaty{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-16px) rotate(7deg)}}

/* ── レイアウト ── */
#app{
  position:relative;z-index:1;
  max-width:720px;margin:0 auto;
  padding:20px 16px 60px;
  padding-bottom:calc(60px + env(safe-area-inset-bottom));
  padding-left:calc(16px + env(safe-area-inset-left));
  padding-right:calc(16px + env(safe-area-inset-right));
}

/* ── ヘッダー ── */
.site-header{text-align:center;padding:16px 0 4px;user-select:none}
.site-logo{
  font-family:'Kaisei Decol',serif;
  font-size:clamp(1.8rem,6vw,3rem);font-weight:700;
  background:linear-gradient(135deg,var(--orange),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 2px 0 #ffccbc);
}
.site-tagline{font-size:.8rem;color:var(--muted);letter-spacing:.15em;margin-top:2px}

/* ── カード ── */
.card{
  background:var(--card);border-radius:28px;
  box-shadow:0 8px 36px var(--shadow),0 1px 0 #fff inset;
  padding:32px 28px;margin-top:20px;
  animation:slideUp .4s cubic-bezier(.22,.68,0,1.2) both;
}
@media(max-width:480px){.card{padding:24px 18px}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:none}}

/* ── ボタン ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  font-family:'M PLUS Rounded 1c',sans-serif;font-weight:900;
  font-size:1rem;border:none;border-radius:50px;cursor:pointer;
  transition:all .18s cubic-bezier(.22,.68,0,1.2);
  padding:14px 32px;letter-spacing:.04em;
  min-height:52px;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  user-select:none;
}
.btn:active{transform:scale(.95)!important}

.btn-main{
  background:linear-gradient(135deg,var(--orange),var(--pink));color:#fff;
  box-shadow:0 4px 20px rgba(255,107,53,.38),0 -2px 0 rgba(0,0,0,.1) inset;
}
@media(hover:hover){
  .btn-main:hover{transform:translateY(-3px) scale(1.03);box-shadow:0 8px 28px rgba(255,107,53,.5),0 -2px 0 rgba(0,0,0,.1) inset}
  .btn-sub:hover{background:#ffd5a8;transform:translateY(-2px)}
}

.btn-sub{background:var(--warm);color:var(--brown);box-shadow:0 2px 10px var(--shadow)}

.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important;box-shadow:none}

/* ════════════════════════════
   スタート画面
════════════════════════════ */
#s-title{text-align:center}
.thumb-wrap{
  width:100%;aspect-ratio:16/9;overflow:hidden;border-radius:28px 28px 0 0;
}
.thumb-img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:transform .4s ease;
}
.thumb-img:hover{transform:scale(1.02)}
.hero-emoji{font-size:5.5rem;display:block;margin-bottom:10px;animation:bounce 1.6s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.hero-title{font-family:'Kaisei Decol',serif;font-size:1.5rem;font-weight:700;color:var(--brown);margin-bottom:6px}
.hero-sub{font-size:.88rem;color:var(--muted);margin-bottom:28px;line-height:1.6}

.quiz-info-grid{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:28px;
}
@media(max-width:360px){
  .quiz-info-grid{grid-template-columns:1fr 1fr;gap:8px}
  .quiz-info-grid > :last-child{grid-column:1/-1}
}
.quiz-info-box{
  background:var(--warm);border-radius:16px;padding:14px 10px;text-align:center;
}
.quiz-info-icon{font-size:1.5rem;display:block;margin-bottom:4px}
.quiz-info-val{font-size:1rem;font-weight:900;color:var(--brown)}
.quiz-info-lbl{font-size:.72rem;color:var(--muted);margin-top:2px}

/* ════════════════════════════
   クイズ画面
════════════════════════════ */
#s-quiz{display:none}

/* 進捗 */
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.progress-bar{flex:1;height:10px;background:var(--warm);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--pink));border-radius:99px;transition:width .5s cubic-bezier(.22,.68,0,1.2)}
.progress-lbl{font-size:.8rem;font-weight:900;color:var(--muted);white-space:nowrap}

/* スコア＋タイマー行 */
.hud{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;gap:8px}

.score-pill{
  display:flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,#fff3e0,#ffe0b2);
  border-radius:50px;padding:8px 14px;
  font-weight:900;font-size:.85rem;color:var(--brown);
  box-shadow:0 2px 8px var(--shadow);
  flex-shrink:0;
}
.score-pill .num{font-size:1.1rem;color:var(--orange)}

.timer-pill{
  display:flex;align-items:center;gap:6px;
  background:#fff;border-radius:50px;padding:8px 12px;
  font-weight:900;font-size:.85rem;
  box-shadow:0 2px 8px var(--shadow);
  transition:background .4s;
  flex-shrink:0;
}
.timer-pill.warn{background:#fff8e1}
.timer-pill.danger{background:#ffebee}
.timer-num{font-size:1.3rem;font-weight:900;min-width:26px;text-align:center;transition:color .3s}
.timer-pill.danger .timer-num{color:var(--red)}

.timer-ring-wrap{position:relative;width:36px;height:36px}
.timer-ring{transform:rotate(-90deg)}
.timer-ring-bg{fill:none;stroke:#f0e0d0;stroke-width:3.5}
.timer-ring-fg{fill:none;stroke:var(--green);stroke-width:3.5;stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke .4s}

/* 問題 */
.q-tag{
  display:inline-block;
  background:linear-gradient(135deg,var(--orange),var(--pink));
  color:#fff;font-size:.75rem;font-weight:900;
  border-radius:8px;padding:3px 12px;letter-spacing:.08em;
  margin-bottom:10px;
}
.q-text{
  font-family:'Kaisei Decol',serif;
  font-size:clamp(1.05rem,3vw,1.35rem);font-weight:700;
  line-height:1.7;color:var(--brown);margin-bottom:24px;
}

/* 選択肢 */
.choices{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.choices{grid-template-columns:1fr}}

.choice{
  display:flex;align-items:center;gap:12px;text-align:left;
  background:var(--cream);border:2.5px solid #e8d5b8;
  border-radius:18px;padding:16px 16px;
  font-family:'M PLUS Rounded 1c',sans-serif;
  font-size:.9rem;font-weight:700;color:var(--brown);
  cursor:pointer;transition:all .2s cubic-bezier(.22,.68,0,1.2);
  min-height:72px;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  user-select:none;
  width:100%;
}
@media(hover:hover){
  .choice:hover:not(:disabled){
    border-color:var(--orange2);
    background:#fff5ec;
    transform:translateY(-3px) scale(1.02);
    box-shadow:0 6px 18px rgba(255,107,53,.18);
  }
}
.choice:active:not(:disabled){
  border-color:var(--orange2);
  background:#fff5ec;
  transform:scale(.98);
  box-shadow:0 2px 10px rgba(255,107,53,.18);
}
.choice-badge{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  background:var(--orange);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:.78rem;font-weight:900;
  transition:background .2s,transform .2s;
}
.choice-txt{line-height:1.4;flex:1}
.choice.correct{background:#e8f8ee;border-color:var(--green);animation:popCorrect .4s cubic-bezier(.22,.68,0,1.4)}
.choice.correct .choice-badge{background:var(--green);transform:scale(1.15)}
.choice.wrong{background:#fff0f2;border-color:var(--red);animation:shakeWrong .4s}
.choice.wrong .choice-badge{background:var(--red)}
.choice:disabled{cursor:default}
@keyframes popCorrect{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
@keyframes shakeWrong{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}

/* 結果バナー */
.result-banner{
  display:none;text-align:center;
  font-size:1.6rem;font-weight:900;padding:12px 0 6px;
  animation:popIn .35s cubic-bezier(.22,.68,0,1.4) both;
}
.result-banner.show{display:block}
.result-banner.ok{color:var(--green)}
.result-banner.fail{color:var(--red)}
@keyframes popIn{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}

/* 解説 */
.exp-box{
  display:none;
  font-size:.85rem;line-height:1.6;color:var(--brown);
  background:#fffbf4;border-left:3px solid var(--orange2);
  border-radius:0 12px 12px 0;
  padding:10px 14px;margin-top:10px;
  animation:fadeIn .3s ease both;
}
.exp-box.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* 次へ */
.next-row{display:none;justify-content:flex-end;margin-top:16px}
.next-row.show{display:flex}
@media(max-width:400px){
  .next-row.show{justify-content:center}
  .next-row .btn{width:100%;font-size:.95rem}
}

/* ─── スマホ全般 ─── */
@media(max-width:480px){
  .card{padding:20px 14px}
  .result-heading{font-size:1.4rem}
  .score-display{font-size:3.5rem}
  .stats{gap:10px}
  .stat{padding:12px 14px;min-width:76px}
  .result-btns{flex-direction:column;align-items:stretch}
  .result-btns .btn{width:100%;justify-content:center}
  .btn-main,.btn-sub{font-size:.95rem;padding:14px 24px}
}

/* ════════════════════════════
   結果画面
════════════════════════════ */
#s-result{display:none;text-align:center}
.result-hero{font-size:5rem;display:block;margin-bottom:8px;animation:bounce 1.4s ease-in-out infinite}
.result-heading{font-family:'Kaisei Decol',serif;font-size:1.7rem;font-weight:700;margin-bottom:8px}

.score-display{
  margin:16px 0 4px;
  background:linear-gradient(135deg,var(--orange),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  font-family:'Kaisei Decol',serif;font-size:4.5rem;font-weight:700;line-height:1;
}
.score-unit{font-size:.9rem;color:var(--muted);margin-bottom:20px}

.stats{display:flex;justify-content:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.stat{background:var(--warm);border-radius:18px;padding:14px 20px;min-width:88px}
.stat-n{font-size:1.7rem;font-weight:900}
.stat-l{font-size:.72rem;color:var(--muted);margin-top:2px}

.result-msg{
  font-size:.95rem;line-height:1.7;color:var(--brown);
  background:#fff9f5;border-radius:16px;padding:14px 18px;margin-bottom:24px;
}
.result-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

.btn-ss{
  background:linear-gradient(135deg,#3dba6f,#2da05d);color:#fff;
  box-shadow:0 4px 20px rgba(61,186,111,.35),0 -2px 0 rgba(0,0,0,.1) inset;
}
@media(hover:hover){
  .btn-ss:hover{transform:translateY(-3px) scale(1.03);box-shadow:0 8px 28px rgba(61,186,111,.5),0 -2px 0 rgba(0,0,0,.1) inset}
}
.btn-ss.loading{opacity:.7;cursor:wait}
</style>
</head>

  { q: "第8回放送のまかないのカレーで登場していないのはどれ?", opts: ["初代バターチキン","グリーンカレー","ビーフカレー","チキンジンジャーカレー"], ans: 1, exp: "無印良品のカレーシリーズでした！" },

const MULTIPLIER   = { easy: 1, normal: 1.5, hard: 2 }; // 難易度倍率

  normal: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAXQAAAF0AQMAAAAJrVAQAAAABlBMVEX///8AAABVwtN+AAAACXBIWXMAAA7EAAAOxAGVKw4bAAABP0lEQVR4nO3ZXRKDIAxGUXbA/nfpDmhrIPn4qfjqeDOdDpYTnzIk2pQIgiAI4qGRi4dd6ne3hcevvC7KUa9+pt/C49f+rCtbeMrvW7fw+K2Xepu38Phb/nt5tPMKj996XdiMdNztj3i8hxWYfmILj196DTuyrg0e3xurNDdV5uILPP7Cd7lnp6tTk5fcsj/i8W6OKLMht0vE4yef/Ixqi/rU3+T4EgCPV5+l0nID1gG1FPH42aekPS5Op3af+jsev/TtvCoybGu9xR3w+NkLtnRncTftd3j8PC/pC2qpwJqb8Pg/vs/1rNK63jwv4fGDsUgyF9VLPH7nYyEP+F29Tf0Ojx9ZjpMq5u2Cx9/2MibZpq7x+I0f5u3+qQ2PX3tNPI8mlZv+iH+9jzOqlVzxf1ot/WI+x7/cEwRBEMTD4gPlj3SlH7JrvQAAAABJRU5ErkJggg==',
  hard:   'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAXQAAAF0AQMAAAAJrVAQAAAABlBMVEX///8AAABVwtN+AAAACXBIWXMAAA7EAAAOxAGVKw4bAAABMUlEQVR4nO3XXRKDIAxGUXbg/nfJDqgI+SFAtY9O7zfOlMqJTxmDKRFCCCEvzVE057+S6726PkrYwuOX3hYnyKkXtpJg8PjZX33VbtZV7jfDFh5/47XfGsDjf/LJdRoe/9C7QpUDw+P3XmMlctkWHr/0U+yT7Vnwf+0PazZtrfqTk7/w+LWXT/sIrhnXew+P33mZa73fnLRrnI94fPBm5N3V20yO33j81svCv6x8bew3PN75fv+KbY0TEI/f+eSOTEk/86XfFvMOj598bC3fh9O8w+PNu+lmQL3HeHzwoTbFwmHY4fE5GgOy29tMrrI6b+PxzfuFPzL1p2Vn8PjZH0UbbI42IR5/663r9COuVeHxD7zfGmYfHr/zrjA8pObLfMTjw3lbTdjC45eeEEIIeVk+GMuEG0o4+XsAAAAASUVORK5CYII='
};

// ================================================================
//  状態
// ================================================================
let qs           = [];
let cur          = 0;
let currentLevel = 'easy';
let score    = 0;
let correct  = 0;
let tLeft    = TIMER_SEC;
let timerID  = null;
let answered = false;
const CIRCUM = 94.2; // 2πr (r=15)

const $ = id => document.getElementById(id);

// ================================================================
//  初期化
// ================================================================
window.addEventListener('DOMContentLoaded', () => {
  $('next-btn').addEventListener('click', nextQ);
  $('menu-btn').addEventListener('click', () => {
    clearInterval(timerID);
    show('s-title');
  });

  $('retry-btn').addEventListener('click', () => {
    startQuiz(currentLevel);
  });

  $('ss-btn').addEventListener('click', saveScreenshot);
});

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

// ================================================================
//  スタート
// ================================================================
function startQuiz(level){
  currentLevel = level;
  const map = { easy: Q_EASY, normal: Q_NORMAL, hard: Q_HARD };
  qs      = shuffle([...map[level]]);
  cur     = 0; score=0; correct=0; answered=false;
  show('s-quiz');
  loadQ();
}

// ================================================================
//  問題表示
// ================================================================
function loadQ(){
  answered=false;
  clearInterval(timerID);
  const q   = qs[cur];
  const tot = qs.length;

  $('prog-fill').style.width = (cur/tot*100)+'%';
  $('prog-lbl').textContent  = `${cur+1} / ${tot}`;
  $('q-tag').textContent     = `Q${cur+1}`;
  $('q-text').textContent    = q.q;
  $('score-now').textContent = score;

  // 選択肢をシャッフル（正解インデックスも追随）
  const LABELS=['A','B','C','D'];
  const shuffled = q.opts
    .map((opt, i) => ({ opt, isAns: i === q.ans }));
  shuffle(shuffled);
  const newAnsIdx = shuffled.findIndex(x => x.isAns);
  currentAnsIdx = newAnsIdx;

  const box = $('choices'); box.innerHTML='';
  shuffled.forEach(({opt}, i)=>{
    const btn=document.createElement('button');
    btn.className='choice';
    btn.innerHTML=`<span class="choice-badge">${LABELS[i]}</span><span class="choice-txt">${opt}</span>`;
    btn.addEventListener('click',()=>answer(i, newAnsIdx));
    box.appendChild(btn);
  });

  $('result-banner').className='result-banner';
  $('result-banner').textContent='';
  $('exp-box').className='exp-box';
  $('exp-box').textContent='';
  $('next-row').className='next-row';

  // タイマー
  tLeft=TIMER_SEC;
  updateTimer();
  timerID=setInterval(()=>{
    tLeft--;
    updateTimer();
    if(tLeft<=0){ clearInterval(timerID); timeUp(); }
  },1000);
}

function updateTimer(){
  $('timer-num').textContent=tLeft;
  const ratio=tLeft/TIMER_SEC;
  $('timer-ring-fg').style.strokeDashoffset=CIRCUM*(1-ratio);
  const cls='timer-pill'+(tLeft<=5?' danger':tLeft<=10?' warn':'');
  $('timer-pill').className=cls;
  $('timer-ring-fg').style.stroke=tLeft<=5?'#ff4757':tLeft<=10?'#ffcc00':'#3dba6f';
}

// ================================================================
//  回答
// ================================================================
let currentAnsIdx = 0; // シャッフル後の正解インデックスを保持

function answer(idx, ansIdx){
  if(answered)return;
  answered=true;
  clearInterval(timerID);
  const btns=[...$('choices').querySelectorAll('.choice')];
  btns.forEach(b=>b.disabled=true);
  btns[ansIdx].classList.add('correct');
  if(idx!==ansIdx) btns[idx].classList.add('wrong');
  const isOk=(idx===ansIdx);
  if(isOk){
    const mult=MULTIPLIER[currentLevel]||1;
    const pts=Math.round((SCORE_BASE+tLeft*SCORE_BONUS)*mult);
    score+=pts; correct++;
    const multStr=mult!==1?` (×${mult})`:'';
    banner(`🎉 せいかい！ +${pts}点${multStr}`,'ok');
  } else {
    banner('😢 ざんねん…','fail');
  }
  showExp();
  $('score-now').textContent=score;
  $('next-row').className='next-row show';
  $('next-btn').textContent=cur===qs.length-1?'📊 結果を見る！':'次の問題へ →';
}

function timeUp(){
  if(answered)return;
  answered=true;
  const btns=[...$('choices').querySelectorAll('.choice')];
  btns.forEach(b=>b.disabled=true);
  btns[currentAnsIdx].classList.add('correct');
  banner('⏰ じかんきれ！','fail');
  showExp();
  $('next-row').className='next-row show';
  $('next-btn').textContent=cur===qs.length-1?'📊 結果を見る！':'次の問題へ →';
}

function banner(msg,type){
  const el=$('result-banner');
  el.textContent=msg;
  el.className=`result-banner show ${type}`;
}

function showExp(){
  const q = qs[cur];
  const el = $('exp-box');
  if(q.exp){
    el.textContent = '💡 ' + q.exp;
    el.className = 'exp-box show';
  } else {
    el.className = 'exp-box';
  }
}

// ================================================================
//  次へ
// ================================================================
function nextQ(){
  cur++;
  if(cur>=qs.length) showResult();
  else loadQ();
}

// ================================================================
//  結果
// ================================================================
function showResult(){
  clearInterval(timerID);
  show('s-result');
  const tot=qs.length, wrong=tot-correct, rate=Math.round(correct/tot*100);
  $('r-score').textContent=score;
  $('r-unit').textContent=`点（全${tot}問）`;
  $('r-correct').textContent=correct;
  $('r-wrong').textContent=wrong;
  $('r-rate').textContent=rate+'%';
  let emoji,heading,msg;
  if(rate===100){emoji='🏆';heading='パーフェクト！すごい！';msg='全問正解！はるちゃん食堂のことを知り尽くしてるね！最高です！🌟'}
  else if(rate>=80){emoji='🎉';heading='すばらしい！';msg='高得点！はるちゃん食堂マスターにあと一歩😊もう一度チャレンジしてみよう！'}
  else if(rate>=60){emoji='😊';heading='なかなかいい感じ！';msg='いい感じ！もう一度チャレンジしてさらに上を目指そう🍱'}
  else if(rate>=40){emoji='🍙';heading='もう一息！';msg='まだまだ伸びしろあり！リベンジしよう💪'}
  else{emoji='😅';heading='次はきっと大丈夫！';msg='何度でもチャレンジしてね🔥'}
  // 全問正解なら特典QRを表示
  const qrReward = $('qr-reward');
  qrReward.style.display = 'none';
  if(rate === 100){
    $('qr-img').src = QR_CODES[currentLevel];
    qrReward.style.display = 'block';
  }

  $('r-emoji').textContent=emoji;
  $('r-heading').textContent=heading;
  $('r-msg').textContent=msg;

  // 称号
  const TITLES = [
    { min:100, rank:'rank-s', icon:'👑', name:'伝説の常連さん', desc:'全問正解！まさに伝説…！はるちゃん食堂が誇る常連の鑑です🌟' },
    { min: 80, rank:'rank-a', icon:'🍳', name:'食堂の達人',     desc:'すばらしい！食堂のことを知り尽くした達人です😊' },
    { min: 60, rank:'rank-b', icon:'🍱', name:'よく見る常連さん', desc:'いつもありがとう！顔なじみの常連さんですね🍱' },
    { min: 40, rank:'rank-c', icon:'🥢', name:'流れの常連さん', desc:'なんとなく来てるけど、それもいい！また来てね🥢' },
    { min:  0, rank:'rank-d', icon:'🍚', name:'一見さん',       desc:'はじめまして！ぜひまた来てください😄' },
  ];
  const t = TITLES.find(x => rate >= x.min);
  const badge = $('title-badge');
  badge.className = 'title-badge ' + t.rank;
  $('title-icon').textContent = t.icon;
  $('title-name').textContent = t.name;
  $('title-desc').textContent = t.desc;
}

// ================================================================
//  スクリーンショット保存
// ================================================================
function saveScreenshot(){
  const btn = $('ss-btn');
  btn.textContent = '⏳ 保存中...';
  btn.classList.add('loading');
  btn.disabled = true;

  const target = $('s-result').querySelector('.card');

  html2canvas(target, {
    backgroundColor: '#ffffff',
    scale: 2,
    useCORS: true,
    allowTaint: true,
    scrollX: 0,
    scrollY: -window.scrollY,
  }).then(canvas => {
    const link = document.createElement('a');
    const level = { easy:'初級', normal:'中級', hard:'上級' }[currentLevel] || '';
    link.download = `はるちゃん食堂クイズ_${level}_結果.jpg`;
    link.href = canvas.toDataURL('image/jpeg', 0.92);
    link.click();
    btn.textContent = '✅ 保存しました！';
    setTimeout(() => {
      btn.textContent = '📸 結果を保存';
      btn.classList.remove('loading');
      btn.disabled = false;
    }, 2000);
  }).catch(() => {
    btn.textContent = '📸 結果を保存';
    btn.classList.remove('loading');
    btn.disabled = false;
    alert('保存に失敗しました。スクリーンショット機能をお試しください。');
  });
}

// ================================================================
//  画面切り替え
// ================================================================
function show(id){
  ['s-title','s-quiz','s-result'].forEach(s=>$(s).style.display=s===id?'block':'none');
